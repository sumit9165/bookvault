spring:
  profiles:
    active: ${SPRING_PROFILE:dev}

  application:
    name: BookVault

  # ── Database — set DB_TYPE=mysql (default) or DB_TYPE=mariadb ──
  datasource:
    # MySQL URL (default)
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookvault}?useSSL=${DB_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${DB_USERNAME:bookvault_user}
    password: ${DB_PASSWORD:bookvault_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: BookVaultHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        # Auto-detected from driver — override via mariadb profile if needed
        format_sql: true
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  session:
    store-type: redis
    redis:
      flush-mode: on-save
      namespace: bookvault:session
    timeout: 3600

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}

  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

  web:
    resources:
      cache:
        period: ${STATIC_CACHE_PERIOD:3600}

# Application-specific
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForBookVaultApplicationThatShouldBeChangedInProduction2024}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    allowed-pdf-types: application/pdf
    max-pdf-size: 52428800

  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}
    rate-limit:
      capacity: ${RATE_LIMIT_CAPACITY:100}
      refill-tokens: ${RATE_LIMIT_REFILL:100}
      refill-period-seconds: ${RATE_LIMIT_PERIOD:60}

  admin:
    default-username: ${ADMIN_USERNAME:admin}
    default-email: ${ADMIN_EMAIL:admin@bookvault.com}
    default-password: ${ADMIN_PASSWORD:Admin@123456}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.bookvault: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json
  error:
    include-message: never
    include-stacktrace: never

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  thymeleaf:
    cache: false
logging:
  level:
    com.bookvault: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 20
  thymeleaf:
    cache: true
  web:
    resources:
      cache:
        period: 86400
server:
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
logging:
  level:
    com.bookvault: WARN

---
# ── MariaDB profile ──────────────────────────────────────────────
# Activate with: SPRING_PROFILE=mariadb  (dev)
#             or SPRING_PROFILE=mariadb-prod  (production)
spring:
  config:
    activate:
      on-profile: mariadb
  datasource:
    # MariaDB connector uses jdbc:mariadb:// scheme
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookvault}?useSSL=${DB_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        # Hibernate 6 auto-detects MariaDB; this is an explicit override
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    # Flyway treats MariaDB as a MySQL variant — this keeps migrations compatible
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookvault}
    driver-class-name: org.mariadb.jdbc.Driver
  thymeleaf:
    cache: false
logging:
  level:
    com.bookvault: DEBUG

---
# ── MariaDB Production profile ───────────────────────────────────
# Activate with: SPRING_PROFILE=mariadb-prod
spring:
  config:
    activate:
      on-profile: mariadb-prod
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookvault}?useSSL=${DB_SSL:true}&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookvault}
    driver-class-name: org.mariadb.jdbc.Driver
  thymeleaf:
    cache: true
  web:
    resources:
      cache:
        period: 86400
server:
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
logging:
  level:
    com.bookvault: WARN
