<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <th:block th:replace="~{fragments/layout :: headMeta('Error')}"/>
  <style>
    .error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .error-code { font-family:var(--font-mono); font-size:6rem; font-weight:700; color:var(--gold-400); line-height:1; margin-bottom:1rem; }
  </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main class="error-page">
  <div>
    <div class="error-code" th:text="${status ?: 'Error'}">Error</div>
    <h1 style="font-size:1.8rem;margin-bottom:0.75rem"
        th:text="${error ?: 'An Error Occurred'}">An Error Occurred</h1>
    <p class="text-muted" style="max-width:400px;margin:0 auto 2rem"
       th:text="${message ?: 'Something went wrong. Please try again.'}">
      Something went wrong.
    </p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <a href="/" class="btn btn-primary">← Go Home</a>
      <button class="btn btn-outline" onclick="window.history.back()">Go Back</button>
    </div>
  </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
