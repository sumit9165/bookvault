<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <th:block th:replace="~{fragments/layout :: headMeta('Sign In')}"/>
</head>
<body>
<div id="toast-container"></div>

<main class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">📚</div>
      <h1 style="font-size:1.8rem;margin-bottom:0.25rem">Welcome Back</h1>
      <p class="text-muted">Sign in to your BookVault account</p>
    </div>

    <!-- Error -->
    <div id="loginError" class="alert alert-error hidden"></div>

    <!-- Form -->
    <form onsubmit="submitLogin(event)">
      <div class="form-group">
        <label class="form-label" for="usernameOrEmail">Username or Email</label>
        <input id="usernameOrEmail" name="usernameOrEmail" type="text"
               class="form-control" placeholder="you@example.com"
               autocomplete="username" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div style="position:relative">
          <input id="password" name="password" type="password"
                 class="form-control" placeholder="••••••••"
                 autocomplete="current-password" required/>
          <button type="button" onclick="togglePassword('password',this)"
                  style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
        Sign In
      </button>
    </form>

    <div class="divider">or</div>

    <p style="text-align:center;color:var(--text-secondary)">
      Don't have an account?
      <a href="/register" class="text-gold">Create one free</a>
    </p>

    <div style="margin-top:1.5rem;padding:1rem;background:rgba(212,168,67,0.06);border-radius:var(--radius-md);border:1px solid var(--border-subtle)">
      <p class="text-xs text-muted" style="text-align:center">
        🔒 Protected by JWT + CSRF tokens · Rate limited · HTTPS in production
      </p>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"/>
<script>
function togglePassword(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
