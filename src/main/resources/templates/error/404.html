<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <th:block th:replace="~{fragments/layout :: headMeta('Page Not Found')}"/>
  <style>
    .error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .error-code { font-family:var(--font-mono); font-size:6rem; font-weight:700; color:var(--gold-400); line-height:1; margin-bottom:1rem; }
    .error-glow { text-shadow: 0 0 60px rgba(212,168,67,0.4); }
  </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main class="error-page">
  <div>
    <div class="error-code error-glow">404</div>
    <h1 style="font-size:1.8rem;margin-bottom:0.75rem">Page Not Found</h1>
    <p class="text-muted" style="max-width:400px;margin:0 auto 2rem">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <a href="/" class="btn btn-primary">← Go Home</a>
      <a href="/books" class="btn btn-outline">Browse Library</a>
    </div>
  </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
